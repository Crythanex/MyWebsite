<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Crythane</title>

<style>

@font-face{font-family:CalSans;src:url(fonts/CalSans-Regular.ttf)}
@font-face{font-family:GeoSans;src:url(fonts/GeosansLight.ttf)}
@font-face{font-family:Alimama;src:url(fonts/AlimamaShuHeiTi-Bold.ttf)}
@font-face{font-family:Ankh;src:url(fonts/AnkhSanctuary-PVK0B.ttf)}

:root{
--bg:#0e1620;
--cyan:#5fd0d6;
--radius:34px;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:#e9f6f7;
font-family:CalSans,Alimama,sans-serif;
overflow:hidden;
}

/* SPLASH */

#splash{
position:fixed;
inset:0;
background:#05090d;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#logo text{
font-family:Ankh;
font-size:96px;
fill:none;
stroke:#6fe3ea;
stroke-width:2;
stroke-dasharray:600;
stroke-dashoffset:600;
animation:draw 2.2s ease forwards;
}

@keyframes draw{
to{stroke-dashoffset:0}
}

#loader{
margin-top:40px;
width:160px;
height:3px;
background:#222;
border-radius:3px;
overflow:hidden;
}

#loader-bar{
height:100%;
width:0%;
background:#6fe3ea;
transition:.3s;
}

#splash.fade{
opacity:0;
pointer-events:none;
transition:1s ease;
}

/* HEADER */

.header{
position:sticky;
top:0;
padding:18px 28px;
backdrop-filter:blur(40px);
background:rgba(18,26,34,.6);
z-index:5;
}

.title{
font-family:Ankh;
font-size:26px;
color:#6fe3ea;
}

/* PAGE */

.page{opacity:0}

.avatar-wrap{
display:flex;
justify-content:center;
margin:56px 0;
}

.avatar{
width:180px;
height:180px;
border-radius:50%;
background:#f6c3cf;
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-size:32px;
}

/* TEXT ANIM */

.apple span{
display:inline-block;
opacity:0;
transform:translateY(14px);
transition:.6s cubic-bezier(.22,.61,.36,1);
}

.apple span.show{
opacity:1;
transform:none;
}

/* CARDS */

.card-list{
padding:0 36px 160px;
display:flex;
flex-direction:column;
gap:32px;
}

.card{
background:var(--cyan);
border-radius:var(--radius);
overflow:hidden;
opacity:0;
transform:translateY(60px) scale(.96);
filter:blur(10px);
transition:.9s cubic-bezier(.16,1,.3,1);
}

.card.show{
opacity:1;
transform:none;
filter:none;
}

.card-main{
aspect-ratio:5/3;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:#062023;
}

.card-footer{
background:#fff;
padding:22px 26px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
color:#222;
}

.arrow{
width:52px;
height:52px;
border-radius:50%;
border:none;
background:var(--cyan);
display:flex;
align-items:center;
justify-content:center;
transition:.12s;
}

.arrow:active{transform:scale(.85)}

.arrow svg{width:24px}

</style>
</head>

<body>

<div id="splash">
<svg id="logo" viewBox="0 0 600 160">
<text x="50%" y="65%" text-anchor="middle">Crythane</text>
</svg>
<div id="loader"><div id="loader-bar"></div></div>
</div>

<div class="page">

<div class="header"><div class="title apple">渊绡 Crythane</div></div>

<div class="avatar-wrap"><div class="avatar apple">Hello</div></div>

<div class="card-list">

<div class="card"><div class="card-main">施工中</div><div class="card-footer">Introduction<button class="arrow">➜</button></div></div>
<div class="card"><div class="card-main">施工中</div><div class="card-footer">Gallery<button class="arrow">➜</button></div></div>
<div class="card"><div class="card-main">施工中</div><div class="card-footer">Label<button class="arrow">➜</button></div></div>
<div class="card"><div class="card-main">施工中</div><div class="card-footer"><button class="arrow">➜</button></div></div>
<div class="card"><div class="card-main">施工中</div><div class="card-footer">Contact<button class="arrow">➜</button></div></div>
<div class="card"><div class="card-main">施工中</div><div class="card-footer">Collaboration<button class="arrow">➜</button></div></div>
<div class="card"><div class="card-main">施工中</div><div class="card-footer">Donation<button class="arrow">➜</button></div></div>

</div>
</div>

<script>

/* loader */

const bar=document.getElementById("loader-bar");
let p=0,done=false;

function tick(){
if(done)return;
p+=Math.random()*10;
bar.style.width=Math.min(p,90)+"%";
setTimeout(tick,280);
}
tick();

window.addEventListener("load",()=>{
done=true;
bar.style.width="100%";
setTimeout(start,400);
});

setTimeout(start,4000);

function start(){
document.getElementById("splash").classList.add("fade");
document.body.style.overflow="auto";
document.querySelector(".page").style.opacity=1;
textAnim();
cardsAnim();
}

/* apple text */

function textAnim(){
document.querySelectorAll(".apple").forEach(el=>{
const t=el.innerText;
el.innerHTML="";
t.split(/(?=[\u4e00-\u9fa5])| /).forEach((c,i)=>{
const s=document.createElement("span");
s.textContent=c+" ";
el.appendChild(s);
setTimeout(()=>s.classList.add("show"),i*60);
});
});
}

/* cards */

function cardsAnim(){
const cards=[...document.querySelectorAll(".card")];
const io=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
io.unobserve(x.target);
}
});
},{threshold:.2});
cards.forEach(c=>io.observe(c));
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Crythane</title>

<style>

/* ===== Fonts ===== */

@font-face{
font-family:"Caviar";
src:url("fonts/CaviarDreams-Bold-2.ttf");
font-display:swap;
}

@font-face{
font-family:"Alimama";
src:url("fonts/AlimamaShuHeiTi-Bold.ttf");
font-display:swap;
}

@font-face{
font-family:"Kazesawa";
src:url("fonts/Kazesawa-Bold.ttf");
font-display:swap;
}

@font-face{
font-family:"Ankh";
src:url("fonts/AnkhSanctuary-PVK0B.ttf");
font-display:swap;
}

/* ===== Root ===== */

:root{
--bg:#0e1620;
--cyan:#5fd0d6;
--text:#e9f6f7;
--dark:#0b1b1e;
--radius:32px;
}

/* ===== Base ===== */

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

margin:0;
background:var(--bg);
color:var(--text);

font-family:"Caviar","Alimama",-apple-system,sans-serif;

overflow:hidden;

}

/* JP font */

body.lang-jp{
font-family:"Kazesawa","Caviar",sans-serif;
}

/* ===== Splash ===== */

#splash{

position:fixed;
inset:0;

background:#0e1620;

display:flex;
align-items:center;
justify-content:center;

z-index:999;

}

#logo{
width:320px;
max-width:70vw;
}

#logo text{

font-family:"Ankh";
font-size:96px;

fill:none;
stroke:#6fe3ea;

stroke-width:2.5;

stroke-dasharray:600;
stroke-dashoffset:600;

animation:draw 1.6s ease forwards,
fill .6s ease forwards 1.6s;

}

@keyframes draw{
to{stroke-dashoffset:0}
}

@keyframes fill{
to{fill:#6fe3ea}
}

#splash.fade{
animation:splashOut .8s ease forwards;
}

@keyframes splashOut{
to{opacity:0;visibility:hidden}
}

/* ===== Page ===== */

.page{
opacity:0;
transition:opacity .7s;
}

/* ===== Header ===== */

.header{

position:sticky;
top:0;

z-index:10;

padding:
calc(16px + env(safe-area-inset-top))
24px
16px;

backdrop-filter:blur(40px) saturate(180%);
background:rgba(18,26,34,.55);

display:flex;
justify-content:center;
align-items:center;

}

/* brand */

.title{

font-family:"Caviar";

font-size:30px;

letter-spacing:1.2px;

color:#6fe3ea;

opacity:0;
transform:translateY(-10px);

transition:.55s cubic-bezier(.22,.61,.36,1);

}

.header.show-title .title{

opacity:1;
transform:translateY(0);

}

/* ===== Language ===== */

.lang-switch{

position:absolute;
right:24px;

top:50%;
transform:translateY(-50%);

}

.lang-btn{

width:40px;
height:32px;

border:1.5px solid #6fe3ea;

border-radius:8px;

background:transparent;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

color:#6fe3ea;

}

.lang-btn svg{
width:18px;
height:18px;
}

/* menu */

.lang-menu{

position:absolute;

right:0;
top:42px;

background:rgba(18,26,34,.92);

backdrop-filter:blur(20px);

border-radius:10px;

padding:8px 0;

display:flex;
flex-direction:column;

opacity:0;
pointer-events:none;

transform:translateY(-6px);

transition:.25s;

}

.lang-menu.show{
opacity:1;
pointer-events:auto;
transform:translateY(0);
}

.lang-menu div{

padding:8px 16px;

cursor:pointer;

font-size:14px;
white-space:nowrap;

}

.lang-menu div:hover{
background:rgba(255,255,255,.08);
}

/* ===== Avatar ===== */

.avatar-wrap{

display:flex;
justify-content:center;

margin:56px 0 30px;

}

.avatar{

width:200px;
height:200px;

border-radius:50%;

background-image:url("fonts/1000075580.jpeg");

background-size:cover;
background-position:center;

}

/* mobile */

@media (max-width:600px){

.avatar{
width:150px;
height:150px;
}

}

/* ===== Intro ===== */

.intro{

text-align:center;

font-size:26px;

margin-bottom:50px;

transition:.55s cubic-bezier(.22,.61,.36,1);

}

.intro.absorb{

transform:translateY(-70px);

opacity:0;

}

/* ===== Cards ===== */

.card-list{

padding:0 24px 120px;

display:flex;
flex-direction:column;

gap:28px;

}

/* card */

.card{

background:var(--cyan);

border-radius:var(--radius);

overflow:hidden;

opacity:0;

transform:translateY(48px) scale(.96);

filter:blur(8px);

transition:.9s cubic-bezier(.16,1,.3,1);

}

.card.show{

opacity:1;

transform:translateY(0) scale(1);

filter:blur(0);

}

/* main */

.card-main{

aspect-ratio:5/3;

display:flex;
align-items:center;

padding-left:34px;

font-size:38px;
font-weight:600;

color:var(--dark);

}

/* footer */

.card-footer{

background:#fff;

padding:20px 24px;

display:flex;

justify-content:space-between;
align-items:center;

font-size:20px;

border-radius:0 0 28px 28px;

color:#222;

}

/* arrow */

.arrow-btn{

width:52px;
height:52px;

border-radius:50%;

border:none;

background:var(--cyan);

display:flex;
align-items:center;
justify-content:center;

transition:.12s;

}

.arrow-btn:active{
transform:scale(.88)
}

.arrow-btn svg{
width:22px;height:22px
}

/* ===== Tablet ===== */

@media (min-width:900px){

.card-list{
padding:0 15vw 140px;
}

}

/* ===== Desktop ===== */

@media (min-width:1300px){

.card-list{
padding:0 22vw 140px;
}

}

</style>
</head>

<body>

<!-- Splash -->

<div id="splash">

<svg id="logo" viewBox="0 0 600 160">

<text x="50%" y="60%" text-anchor="middle">
Crythane
</text>

</svg>

</div>

<div class="page">

<!-- Header -->

<div class="header">

<div class="title">
Crythane
</div>

<div class="lang-switch">

<button class="lang-btn" id="langBtn">

<svg viewBox="0 0 24 24">

<circle cx="12" cy="12" r="9"
stroke="currentColor"
stroke-width="2"
fill="none"/>

<ellipse cx="12" cy="12"
rx="4"
ry="9"
stroke="currentColor"
stroke-width="2"
fill="none"/>

<path d="M3 12h18"
stroke="currentColor"
stroke-width="2"/>

</svg>

</button>

<div class="lang-menu" id="langMenu">

<div data-lang="zh">简体中文</div>
<div data-lang="en">English</div>
<div data-lang="jp">日本語</div>

</div>

</div>

</div>

<!-- Avatar -->

<div class="avatar-wrap">
<div class="avatar"></div>
</div>

<!-- Intro -->

<div class="intro" data-i18n="intro">
你好，这里是凌绡
</div>

<!-- Cards -->

<div class="card-list">

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="intro_card">自介</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="gallery">图库</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="commission">约稿</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="projects">项目</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="contact">联络</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="friends">友链</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

<div class="card">
<div class="card-main">施工中</div>
<div class="card-footer">
<span data-i18n="donation">捐赠</span>
<button class="arrow-btn">
<svg viewBox="0 0 24 24">
<path d="M9 6l6 6-6 6"
stroke="currentColor"
stroke-width="2.5"
fill="none"/>
</svg>
</button>
</div>
</div>

</div>

</div>

<script>

/* Splash */

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("splash")
.classList.add("fade")

document.body.style.overflow="auto"

document.querySelector(".page").style.opacity=1

startPage()

},2000)

})

/* Card animation */

function startPage(){

const cards=[...document.querySelectorAll(".card")]

const obs=new IntersectionObserver(e=>{

e.forEach(x=>{

if(x.isIntersecting){

x.target.classList.add("show")
obs.unobserve(x.target)

}

})

},{threshold:.15})

cards.forEach(c=>obs.observe(c))

const header=document.querySelector(".header")
const intro=document.querySelector(".intro")

addEventListener("scroll",()=>{

if(scrollY>80){

header.classList.add("show-title")
intro.classList.add("absorb")

}else{

header.classList.remove("show-title")
intro.classList.remove("absorb")

}

})

}

/* Language */

const LANG={

zh:{
intro:"你好，这里是凌绡",
intro_card:"自介",
gallery:"图库",
commission:"约稿",
projects:"项目",
contact:"联络",
friends:"友链",
donation:"捐赠"
},

en:{
intro:"Hey there, I am Crythane",
intro_card:"Introduction",
gallery:"Gallery",
commission:"Commission",
projects:"Project",
contact:"Contact",
friends:"Links",
donation:"Donation"
},

jp:{
intro:"ようこそ、凌绡（シノセン）へ",
intro_card:"自己紹介",
gallery:"ギャラリー",
commission:"コミッション",
projects:"プロジェクト",
contact:"連絡",
friends:"リンク",
donation:"寄付"
}

}

function setLang(lang){

localStorage.setItem("lang",lang)

document.querySelectorAll("[data-i18n]").forEach(el=>{

const key=el.dataset.i18n

if(LANG[lang][key])
el.textContent=LANG[lang][key]

})

document.body.classList.remove("lang-jp")

if(lang==="jp"){
document.body.classList.add("lang-jp")
}

}

const savedLang=localStorage.getItem("lang")||"zh"

setLang(savedLang)

const btn=document.getElementById("langBtn")
const menu=document.getElementById("langMenu")

btn.onclick=()=>{
menu.classList.toggle("show")
}

menu.querySelectorAll("[data-lang]").forEach(item=>{

item.onclick=()=>{

setLang(item.dataset.lang)
menu.classList.remove("show")

}

})

</script>

</body>
</html>
